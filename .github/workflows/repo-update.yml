name: Update github pages with the most recent debian packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/repo-update.yml'
      - 'docs/**'
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Fetch most recent packages and prepare repo folder
        run: |
          cat <<EOF > .gpg
          ${{ secrets.GPG_KEY }}
          EOF

          cat <<EOF > .gpg-password-env
          SIGNING_PASSWORD=${{ secrets.GPG_PASSWORD }}
          EOF

          sudo make repo-update
          sudo rm -rf repo/incoming

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        name: Setup node (npm)
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: "docs/package-lock.json"

      - name: Install dependencies
        working-directory: docs
        run: |
          npm ci

      - name: Generate package metadata for docs
        run: |
          node scripts/generate-docs-packages.js repo/dists/trixie/main/binary-amd64/Packages

      - name: Build docs
        working-directory: docs
        run: |
          npm run build

      - name: Collect files for deployment
        run: |
          mkdir -p github-pages
          cp -r docs/dist/* github-pages/
          cp -r repo github-pages/debian

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: github-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
